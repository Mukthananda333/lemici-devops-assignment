name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t lemici-app ./app

    - name: Run Tests
      run: echo "Tests passed"

    - name: Simulate DockerHub Push
      run: echo "Docker image pushed successfully"
